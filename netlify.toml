# netlify.toml — ShopTrack cache & routing config
# Drop-deploy compatible — no plugins, no build command

# ── Cache headers ─────────────────────────────────────────────────────────────

# HTML files — never cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# app.js — short cache, busted by ?v= param on every deploy
[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Netlify functions — no cache
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Redirects ─────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/affiliates"
  to = "/affiliates.html"
  status = 200

[[redirects]]
  from = "/affiliates/"
  to = "/affiliates.html"
  status = 200

# ── SPA catch-all — serves index.html for all paths ──────────────────────────
# This prevents 'Uncaught SyntaxError: Invalid or unexpected token' when
# Supabase email verification URLs (with long query params) are opened directly
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Scheduled functions (cron) — defined here, no plugin needed ───────────────
[functions]
  directory = "netlify/functions"

[[schedule]]
  function = "trial-drip"
  cron = "0 8 * * *"

[[schedule]]
  function = "campay-billing"
  cron = "0 7 * * *"
